<div class="sticky">
    <hr>
    <div id="breadcrumbs">
        <h2>~\&nbsp;</h2>
        {{- range .Ancestors.Reverse -}}
            {{- if .IsHome -}}
                <h2><a href="{{ .RelPermalink }}" class="nowrap">Root</a></h2>
                <h2>&nbsp;\&nbsp;</h2>
            {{- else -}}
                <h2><a href="{{ .RelPermalink }}" class="nowrap">{{- .Title -}}</a></h2>
                <h2>&nbsp;\&nbsp;</h2>
            {{- end }}
        {{- end -}}

        {{- if .IsHome -}}
            <h2><a href="{{ .RelPermalink }}" class="nowrap">Root</a></h2>
        {{- else -}}
            <h2><a href="{{ .RelPermalink }}" class="nowrap">{{- .Title -}}</a></h2>
        {{- end -}}
    </div>
    <hr>
</div>
