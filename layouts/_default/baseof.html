<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        {{- $css := resources.Get "css/style.css" -}}
        <link rel="stylesheet" href="{{ $css.RelPermalink }}">
        <script src="/javascript/main.js"></script>

        <title> {{- .Title -}} </title>
    </head>
    <body>
        {{- partial "header.html" . -}}

        {{- partial "banner.html" . -}}

        {{- block "main" . -}}
        
        {{- end -}}

        {{- partial "footer.html" . -}}
    </body>
</html>
